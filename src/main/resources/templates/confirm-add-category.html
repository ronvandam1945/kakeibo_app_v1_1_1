<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
<meta charset="UTF-8">
<title>カテゴリ登録確認</title>
<link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
	
	<div th:if="${param.timeout}" class="error-msg">
		セッションが切れました。もう一度ログインしてください。
	</div>
		
	<h2>カテゴリ登録確認</h2>
	
	<table class="confirm-table" th:object="${addCategoryForm}">
		<tr>
			<td class="guide">【カテゴリ名】</td>
			<td th:text="*{name}"></td>
		</tr>
		<tr>
			<td class="guide">【収支区分】</td>
			<td th:text="*{type}"></td>
		</tr>
		<tr>
			<td class="guide">【ソート順】</td>
			<td th:text="*{sortOrder}"></td>
		</tr>
	</table>
	
	<br><br>

    <form th:action="@{/do-add-category}" method="POST"
			th:object="${addCategoryForm}">
    	<input type="hidden" th:field="*{name}">
    	<input type="hidden" th:field="*{type}">
    	<input type="hidden" th:field="*{sortOrder}">
    	<input type="submit" value="登録実行" class="btn">
   	</form>
	
	<br>


    <form th:action="@{/back-add-category}" method="POST"
			th:object="${addCategoryForm}">
			<input type="hidden" th:field="*{name}">
			<input type="hidden" th:field="*{type}">
			<input type="hidden" th:field="*{sortOrder}">
    	<input type="submit" value="もどる" class="btn">
   	</form>

</body>
</html>
